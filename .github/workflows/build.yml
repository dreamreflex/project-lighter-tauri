name: Build & Upload Artifacts

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "构建平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows-only
          - macos-only
          - linux-only

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          case "${{ inputs.platforms }}" in
            windows-only)
              matrix='{"include":[{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc","label":"windows-x64"}]}'
              ;;
            macos-only)
              matrix='{"include":[{"platform":"macos-latest","rust_target":"aarch64-apple-darwin","label":"macos-arm64"},{"platform":"macos-13","rust_target":"x86_64-apple-darwin","label":"macos-x64"}]}'
              ;;
            linux-only)
              matrix='{"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu","label":"linux-x64"}]}'
              ;;
            *)
              matrix='{"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu","label":"linux-x64"},{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc","label":"windows-x64"},{"platform":"macos-latest","rust_target":"aarch64-apple-darwin","label":"macos-arm64"},{"platform":"macos-13","rust_target":"x86_64-apple-darwin","label":"macos-x64"}]}'
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.rust_target }}

      # Windows: 上传 .msi 和 .exe 安装包
      - name: Upload Windows artifacts
        if: contains(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: DreamReflexLighter-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Generate attestation - Windows
        if: contains(matrix.platform, 'windows')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi

      # macOS: 上传 .dmg
      - name: Upload macOS artifacts
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: DreamReflexLighter-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Generate attestation - macOS
        if: contains(matrix.platform, 'macos')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg

      # Linux: 上传 .deb
      - name: Upload Linux artifacts
        if: contains(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: DreamReflexLighter-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Generate attestation - Linux
        if: contains(matrix.platform, 'ubuntu')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
