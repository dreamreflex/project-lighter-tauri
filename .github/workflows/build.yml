name: Build & Upload Artifacts

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: "构建平台"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows-only
          - macos-only
          - linux-only

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            label: linux-x64
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            label: windows-x64
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-13
            rust_target: x86_64-apple-darwin
            label: macos-x64

    runs-on: ${{ matrix.platform }}

    # 根据用户选择的平台过滤 job
    if: >-
      github.event.inputs.platforms == 'all' ||
      (github.event.inputs.platforms == 'windows-only' && contains(matrix.platform, 'windows')) ||
      (github.event.inputs.platforms == 'macos-only'   && contains(matrix.platform, 'macos')) ||
      (github.event.inputs.platforms == 'linux-only'   && contains(matrix.platform, 'ubuntu'))

    steps:
      - uses: actions/checkout@v4

      # Linux 依赖
      - name: Install Linux dependencies
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.rust_target }}

      # Windows: 上传 .msi 和 .exe 安装包
      - name: Upload Windows artifacts
        if: contains(matrix.platform, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: DreamReflexLighter-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe
          if-no-files-found: warn

      # macOS: 上传 .dmg
      - name: Upload macOS artifacts
        if: contains(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: DreamReflexLighter-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      # Linux: 上传 .deb
      - name: Upload Linux artifacts
        if: contains(matrix.platform, 'ubuntu')
        uses: actions/upload-artifact@v4
        with:
          name: DreamReflexLighter-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb/*.deb
          if-no-files-found: warn
