name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_note:
        description: '手动构建备注（仅供参考）'
        required: false
        default: 'Manual build'

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-22.04
            artifact: lighter-linux-x64

          - platform: windows
            os: windows-latest
            artifact: lighter-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Linux 系统依赖（Tauri v2 需要 webkit2gtk-4.1）
      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      # ── 打 tag 触发：构建并发布 Release ──────────────────────────────
      - name: Build & publish Release (tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '${{ github.ref_name }} - 项目启动器'
          releaseBody: |
            ## 项目启动器 ${{ github.ref_name }}

            ### 下载说明

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows | `*_x64-setup.exe` | NSIS 安装包（推荐） |
            | Windows | `*_x64_en-US.msi` | MSI 安装包 |
            | Linux | `*_amd64.deb` | Debian / Ubuntu |
            | Linux | `*_amd64.AppImage` | 通用 Linux（无需安装） |

            > Windows 10 1903+ / Windows 11 自带 WebView2，无需额外安装。
          releaseDraft: false
          prerelease: false

      # ── 手动触发：构建并上传 Artifact（7天有效）────────────────────────
      - name: Build app (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: npm run tauri build
        env:
          CI: false

      - name: Upload artifact (manual dispatch) - Linux
        if: github.event_name == 'workflow_dispatch' && matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          retention-days: 7
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/rpm/*.rpm

      - name: Upload artifact (manual dispatch) - Windows
        if: github.event_name == 'workflow_dispatch' && matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          retention-days: 7
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
